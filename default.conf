server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't advertise the nginx version.
    server_tokens off;

    # Shared security headers. nginx's add_header directive doesn't inherit
    # into a location that declares its own add_header, so each location below
    # repeats the ones it needs.

    # HTML (including '/') must revalidate on every load so the page picks up
    # the new versioned JS URL after a deploy. Revalidation is cheap — nginx
    # returns 304 when the file is unchanged.
    location / {
        add_header Cache-Control "no-cache" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' https://cloudflareinsights.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        try_files $uri $uri/ =404;
    }

    # JS/CSS carry a ?v=DEPLOY_VERSION query that changes every deploy, so old
    # copies can be cached forever without risk of staleness.
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
    }
}
